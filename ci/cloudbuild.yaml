options:
  dynamic_substitutions: true
  # Increased from default to 8 vCPUs / 8GB RAM to prevent OOM/silent crashes
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'

substitutions:
  _BUILD_TYPE: "presubmit"
  _TEST_TYPE: "system"
  _NODE_VERSION: "18"
  _REPO_OWNER: "googleapis"
  _REPO_NAME: "google-cloud-node-core"

logsBucket: 'gs://${_LOGS_BUCKET}/logs/google-cloud-node-core/${_BUILD_TYPE}/${COMMIT_SHA}/${TRIGGER_NAME}'
timeout: 32400s

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: "bash"
    args: ["ci/deletecloudbuild.sh"]
    env:
    - 'REF_NAME=${REF_NAME}'

  - name: gcr.io/${PROJECT_ID}/google-cloud-node-core-${_NODE_VERSION}
    id: "run-tests"
    timeout: 32400s
    entrypoint: "bash"
    args:
      - '-c'
      - |
        echo "Verifying gapic-showcase binary..."
        ls -l /workspace/bin/gapic-showcase || echo "BINARY NOT FOUND IN /workspace/bin"
        ci/run_conditional_tests.sh
    env:
    - 'BUILD_TYPE=${_BUILD_TYPE}'
    - 'TEST_TYPE=${_TEST_TYPE}'
    - 'GAPIC_SHOWCASE_PATH=/workspace/bin/gapic-showcase'
    - 'BUILD_ID=$BUILD_ID'
    - 'PROJECT_ID=$PROJECT_ID'
    - 'REPO_OWNER=${_REPO_OWNER}'
    - 'REPO_NAME=${_REPO_NAME}'
    - 'COMMIT_SHA=$COMMIT_SHA'
    - 'PATH=/usr/local/gcloud/google-cloud-sdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'
    waitFor: ['Build Showcase']
