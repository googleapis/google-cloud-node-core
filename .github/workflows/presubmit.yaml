on:
  pull_request:
name: presubmit
jobs:
  units:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 300
      - uses: pnpm/action-setup@v4
        with:
          version: ^10.0.0
      - name: Install dependencies
        run: pnpm install
      - name: Run unit tests
        run: ci/run_conditional_tests.sh
        env:
          BUILD_TYPE: presubmit
          TEST_TYPE: units
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ^10.0.0
      - name: Install dependencies
        run: pnpm install
      - name: Run lint
        run: pnpm -r lint
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ^10.0.0
      - name: Install dependencies
        run: pnpm install
      - name: Build docs
        run: pnpm -r docs
      - uses: JustinBeckwith/linkinator-action@v1
        with:
          paths: docs/
